sources:
  dataset_root:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData"

  test_job_details:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.TestInfo.testJobDetails"

  related_article:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.TestInfo.relatedResearchOutcome.relatedArticle[*]"

  data_processing:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.DataProcessingProcedures"

  test_piece:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.TestPiece"

  material_history:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.MaterialHistoryAndCondition"

  chemcomp_measured_wtpct:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.MaterialHistoryAndCondition.chemicalComposition[*].chemicalCompositionMeasured[?(@.unit==\"Wt. %\")]"

  chemcomp_measured_ppm:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.MaterialHistoryAndCondition.chemicalComposition[*].chemicalCompositionMeasured[?(@.unit==\"ppm\")]"

  test_machine:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.MeasuringAndTestEquipment.testMachine"

  extensometer_equipment:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.MeasuringAndTestEquipment.extensionValues.contactingExtensometer"

  test_parameters:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.AdditionalMetadata.TestInfo.testParameters"

  values_after_test_end:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.PrimaryData.TestResult.valuesRecordedAfterTestEnd"

  values_at_test_start:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.PrimaryData.TestResult.valuesRecordedAtTestStart"

  values_during_test_run:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.PrimaryData.TestResult.valuesRecordedDuringTestRun"

  secondary_elongation_values:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.SecondaryData.TestResult.elongationValues"

  secondary_extension_values:
    access: .rml_work/current.json
    referenceFormulation: jsonpath
    iterator: "$.MeasurementData.SecondaryData.TestResult.extensionValues"





mappings:
  # SHARED ENTITIES

  creep_reference_dataset:
    sources: dataset_root
    s: msekg:$(_fileID)
    po:
      - [a, creep_reference_dataset:]
      - [rdfs:label, $(_fileID)]
      - [is_specified_output_of:, msekg:creep_testing_process_$(_fileID)~iri]

  creep_testing_process:
    sources: dataset_root
    s: msekg:creep_testing_process_$(_fileID)
    po:
      - [a, creep_testing_process:]

  creep_test_piece:
    sources: test_piece
    s: msekg:creep_test_piece_$(_fileID)
    po:
      - [a, creep_test_piece:]
      - [rdfs:label, $(testpieceID)]
      - [participates_in:, msekg:creep_testing_process_$(_fileID)~iri]

  creep_testing_machine:
    sources: test_machine
    s: msekg:creep_testing_machine_$(_fileID)
    po:
      - [a, creep_testing_machine:]
      - [rdfs:label, $(testMachineID)]
      - [participates_in:, msekg:creep_testing_process_$(_fileID)~iri]

  extensometer:
    sources: extensometer_equipment
    s: msekg:extensometer_$(_fileID)
    po:
      - [a, extensometer:]
      - [rdfs:label, $(extensometerModelInformation)]
      - [participates_in:, msekg:creep_testing_process_$(_fileID)~iri]


  # PARAMETERS 

  # --- relatedArticle.DOI ---
  # 'digital object identifier' and (denotes some (publication and ('is about' some 'creep testing process')))
  digital_object_identifier:
    sources: related_article
    s: msekg:digital_object_identifier_$(_fileID)_$(_idx)
    po:
      - [a, digital_object_identifier:]
      - [denotes:, msekg:publication_$(_fileID)_$(_idx)~iri]
      - [has_value:, $(DOI)]

  publication:
    sources: related_article
    s: msekg:publication_$(_fileID)_$(_idx)
    po:
      - [a, publication:]
      - [is_about:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- dateOfTestEnd ---
  # 'date process ended' and (denotes some (temporal instant and ('last instant of' some 'test duration')))
  date_process_ended:
    sources: test_job_details
    s: msekg:date_process_ended_$(_fileID)
    po:
      - [a, date_process_ended:]
      - [denotes:, msekg:temporal_instant_end_$(_fileID)~iri]
      - [has_value:, $(dateOfTestEnd)]

  temporal_instant_end:
    sources: test_job_details
    s: msekg:temporal_instant_end_$(_fileID)
    po:
      - [a, temporal_instant:]
      - [last_instant_of:, msekg:test_duration_$(_fileID)~iri]

  # --- dateOfTestStart ---
  # 'date process started' and (denotes some (temporal instant and ('first instant of' some 'test duration')))
  date_process_started:
    sources: test_job_details
    s: msekg:date_process_started_$(_fileID)
    po:
      - [a, date_process_started:]
      - [denotes:, msekg:temporal_instant_start_$(_fileID)~iri]
      - [has_value:, $(dateOfTestStart)]

  temporal_instant_start:
    sources: test_job_details
    s: msekg:temporal_instant_start_$(_fileID)
    po:
      - [a, temporal_instant:]
      - [first_instant_of:, msekg:test_duration_$(_fileID)~iri]

  # --- project ---
  # 'process identifier' and (denotes some (project and ('has part' some 'creep testing process')))
  process_identifier:
    sources: test_job_details
    s: msekg:process_identifier_$(_fileID)
    po:
      - [a, process_identifier:]
      - [denotes:, msekg:project_$(_fileID)~iri]
      - [has_value:, $(project)]

  project:
    sources: test_job_details
    s: msekg:project_$(_fileID)
    po:
      - [a, project:]
      - [has_part:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- testID ---
  # 'assay identifier' and (denotes some 'creep testing process')
  assay_identifier:
    sources: test_job_details
    s: msekg:assay_identifier_$(_fileID)
    po:
      - [a, assay_identifier:]
      - [denotes:, msekg:creep_testing_process_$(_fileID)~iri]
      - [has_value:, $(testID)]

  # --- initialStress ---
  # 'input specification' and (is_concretized_as some (mechanical stress and (realized_in some 'creep testing process')))
  input_specification_stress:
    sources: test_parameters
    s: msekg:input_specification_stress_$(_fileID)
    po:
      - [a, input_specification:]
      - [is_concretized_as:, msekg:quality_mechanical_stress_$(_fileID)~iri]
      - [has_value:, $(initialStress.value)]
      - [has_measurement_unit_label:, unit:MegaPA~iri]

  quality_mechanical_stress:
    sources: test_parameters
    s: msekg:quality_mechanical_stress_$(_fileID)
    po:
      - [a, mechanical_stress:]
      - [realized_in:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- preload ---
  # 'input specification' and (is_concretized_as some (force and (realized_in some 'creep testing process')))
  input_specification_preload:
    sources: test_parameters
    s: msekg:input_specification_preload_$(_fileID)
    po:
      - [a, input_specification:]
      - [is_concretized_as:, msekg:quality_force_preload_$(_fileID)~iri]
      - [has_value:, $(preload.value)]
      - [has_measurement_unit_label:, unit:KiloN~iri]

  quality_force_preload:
    sources: test_parameters
    s: msekg:quality_force_preload_$(_fileID)
    po:
      - [a, force:]
      - [realized_in:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- specifiedTemperature ---
  # 'input specification' and (is_concretized_as some (temperature and (quality_of some 'creep testing machine')))
  input_specification_temperature:
    sources: test_parameters
    s: msekg:input_specification_temperature_$(_fileID)
    po:
      - [a, input_specification:]
      - [is_concretized_as:, msekg:quality_temperature_$(_fileID)~iri]
      - [has_value:, $(specifiedTemperature.value)]
      - [has_measurement_unit_label:, unit:DEG_C~iri]

  quality_temperature:
    sources: test_parameters
    s: msekg:quality_temperature_$(_fileID)
    po:
      - [a, temperature:]
      - [quality_of:, msekg:creep_testing_machine_$(_fileID)~iri]

  # --- testStandard ---
  # 'creep test standard' and (is_concretized_as some (plan and ('intended to realize' some 'creep testing process')))
  creep_test_standard:
    sources: test_parameters
    s: msekg:creep_test_standard_$(_fileID)
    po:
      - [a, creep_test_standard:]
      - [is_concretized_as:, msekg:plan_$(_fileID)~iri]
      - [has_value:, $(testStandard.testStandardOptions)]

  plan:
    sources: test_parameters
    s: msekg:plan_$(_fileID)
    po:
      - [a, plan:]

  process_intended_to_realize:
    sources: test_parameters
    s: msekg:creep_testing_process_$(_fileID)
    po:
      - [intended_to_realize:, msekg:plan_$(_fileID)~iri]

  # --- testpieceID ---
  # 'creep test piece identifier' and (denotes some 'creep test piece')
  creep_test_piece_identifier:
    sources: test_piece
    s: msekg:creep_test_piece_identifier_$(_fileID)
    po:
      - [a, creep_test_piece_identifier:]
      - [denotes:, msekg:creep_test_piece_$(_fileID)~iri]
      - [has_value:, $(testpieceID)]

  # --- testPieceTypeI ---
  # 'categorical value specification' and (specifies_value_of some 'creep test piece')
  value_specification_test_piece_type:
    sources: test_piece
    s: msekg:value_specification_test_piece_type_$(_fileID)
    po:
      - [a, categorical_value_specification:]
      - [specifies_value_of:, msekg:creep_test_piece_$(_fileID)~iri]
      - [has_value:, $(testPieceTypeI)]

  # --- dataAnalysisProcedures ---
  # 'textual description' and (denotes some ('data processing process' and (preceded_by some 'creep testing process')))
  textual_description_data_analysis_procedures:
    sources: data_processing
    s: msekg:textual_description_data_analysis_procedures_$(_fileID)
    po:
      - [a, textual_description:]
      - [denotes:, msekg:data_processing_process_$(_fileID)~iri]
      - [has_value:, $(dataAnalysisProcedures)]

  data_processing_process:
    sources: data_processing
    s: msekg:data_processing_process_$(_fileID)
    po:
      - [a, data_processing_process:]
      - [preceded_by:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- condition (asManufacturedMaterial) ---
  # 'material state' and (specifies_value_of some 'creep test piece')
  value_specification_material_condition:
    sources: material_history
    s: msekg:value_specification_material_condition_$(_fileID)
    po:
      - [a, material_state:]
      - [specifies_value_of:, msekg:creep_test_piece_$(_fileID)~iri]
      - [has_value:, $(asManufacturedMaterial.condition)]

  # --- formOfAsManufacturedMaterial ---
  # 'categorical value specification' and (specifies_value_of some 'creep test piece')
  value_specification_material_form:
    sources: material_history
    s: msekg:value_specification_material_form_$(_fileID)
    po:
      - [a, categorical_value_specification:]
      - [specifies_value_of:, msekg:creep_test_piece_$(_fileID)~iri]
      - [has_value:, $(asManufacturedMaterial.formOfAsManufacturedMaterial)]

  # --- geometrySizeAsManufacturedMaterial ---
  # 'textual description' and (denotes some 'creep test piece')
  textual_description_geometry_size:
    sources: material_history
    s: msekg:textual_description_geometry_size_$(_fileID)
    po:
      - [a, textual_description:]
      - [denotes:, msekg:creep_test_piece_$(_fileID)~iri]
      - [has_value:, $(asManufacturedMaterial.geometrySizeAsManufacturedMaterial)]

  # --- manufacturingProcessDescriptionAsManufacturedMaterial ---
  # 'textual description' and (denotes some ('manufacturing process' and (preceded_by some 'creep testing process')))
  textual_description_manufacturing_process:
    sources: material_history
    s: msekg:textual_description_manufacturing_process_$(_fileID)
    po:
      - [a, textual_description:]
      - [denotes:, msekg:manufacturing_process_$(_fileID)~iri]
      - [has_value:, $(asManufacturedMaterial.manufacturingProcessDescriptionAsManufacturedMaterial)]

  manufacturing_process:
    sources: material_history
    s: msekg:manufacturing_process_$(_fileID)
    po:
      - [a, manufacturing_process:]
      - [preceded_by:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- solidification ---
  # 'textual description' and (denotes some ('phase transformation' and (preceded_by some 'creep testing process')))
  textual_description_solidification:
    sources: material_history
    s: msekg:textual_description_solidification_$(_fileID)
    po:
      - [a, textual_description:]
      - [denotes:, msekg:phase_transformation_$(_fileID)~iri]
      - [has_value:, $(asManufacturedMaterial.solidification)]

  phase_transformation:
    sources: material_history
    s: msekg:phase_transformation_$(_fileID)
    po:
      - [a, phase_transformation:]
      - [preceded_by:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- manufacturingProcessDescriptionAsTestedMaterial ---
  # 'textual description' and (denotes some ('heat treatment' and (preceded_by some 'creep testing process')))
  textual_description_manufacturing_process_tested:
    sources: material_history
    s: msekg:textual_description_manufacturing_process_tested_$(_fileID)
    po:
      - [a, textual_description:]
      - [denotes:, msekg:heat_treatment_$(_fileID)~iri]
      - [has_value:, $(asTestedMaterial.manufacturingProcessDescriptionAsTestedMaterial)]

  heat_treatment:
    sources: material_history
    s: msekg:heat_treatment_$(_fileID)
    po:
      - [a, heat_treatment:]
      - [preceded_by:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- supplier ---
  # 'identifier' and (denotes some ('material entity' and (participates_in some 'supply chain process')))
  identifier_supplier:
    sources: material_history
    s: msekg:identifier_supplier_$(_fileID)
    po:
      - [a, identifier:]
      - [denotes:, msekg:supplier_$(_fileID)~iri]
      - [has_value:, $(asTestedMaterial.supplier)]

  supplier:
    sources: material_history
    s: msekg:supplier_$(_fileID)
    po:
      - [a, material_entity:]
      - [participates_in:, msekg:supply_chain_process_$(_fileID)~iri]

  # --- supplyDate ---
  # 'date value specification' and (specifies_value_of some ('supply chain process' and (preceded_by some 'creep testing process')))
  value_specification_supply_date:
    sources: material_history
    s: msekg:value_specification_supply_date_$(_fileID)
    po:
      - [a, date_value_specification:]
      - [specifies_value_of:, msekg:supply_chain_process_$(_fileID)~iri]
      - [has_value:, $(asTestedMaterial.supplyDate)]

  supply_chain_process:
    sources: material_history
    s: msekg:supply_chain_process_$(_fileID)
    po:
      - [a, supply_chain_process:]
      - [preceded_by:, msekg:creep_testing_process_$(_fileID)~iri]

  # --- heatTreatmentState ---
  # 'heat treated material state' and (specifies_value_of some 'creep test piece')
  value_specification_heat_treatment_state:
    sources: material_history
    s: msekg:value_specification_heat_treatment_state_$(_fileID)
    po:
      - [a, heat_treated_material_state:]
      - [specifies_value_of:, msekg:creep_test_piece_$(_fileID)~iri]
